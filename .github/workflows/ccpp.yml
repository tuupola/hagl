name: C/C++ CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - name: make test
        run: make -C tests test
      - name: Upload test images
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-images
          path: tests/output/
          retention-days: 7
